version: '3.8'
services:
  mbio-bot:
    build: .
    container_name: mbio-signalbot
    ports:
    - 8000:8000
    volumes:
    - ./main.py:/app/main.py
    - ./frontend-v2-dist:/app/frontend-v2-dist:ro
    - ./config:/app/config:ro
    - ./core:/app/core
    - ./execution:/app/execution
    - ./routes:/app/routes
    - ./monitoring:/app/monitoring:ro
    - ./static_frontend:/app/static_frontend:ro
    - ./data:/app/data
    - ./db:/app/db
    - ./templates:/app/templates
    environment:
    - HL_PRIVATE_KEY=${HL_PRIVATE_KEY}
    - HL_ACCOUNT_ADDRESS=${HL_ACCOUNT_ADDRESS}
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    env_file:
    - .env
    depends_on:
    - redis
    restart: unless-stopped
    networks:
    - mbio-network
  redis:
    image: redis:7-alpine
    container_name: mbio-redis
    restart: unless-stopped
    networks:
    - mbio-network
  nginx:
    image: nginx:1.25-alpine
    container_name: mbio-nginx
    ports:
    - 80:80
    volumes:
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    - ./frontend-v2-dist:/usr/share/nginx/html:ro
    depends_on:
    - mbio-bot
    restart: unless-stopped
    networks:
    - mbio-network
networks:
  mbio-network:
    driver: bridge
