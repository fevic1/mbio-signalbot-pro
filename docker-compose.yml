services:
  mbio-bot:
    build: .
    container_name: mbio-signalbot
    ports:
      - "8000:8000" # Kept for direct API testing and health checks
    volumes:
      - ./main.py:/app/main.py:ro
      - ./config:/app/config:ro
      - ./core:/app/core:ro
      - ./execution:/app/execution:ro
      - ./routes:/app/routes:ro
      - ./monitoring:/app/monitoring:ro
      - ./data:/app/data
      - ./db:/app/db
      - ./templates:/app/templates:ro
    environment:
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY}
      - HL_ACCOUNT_ADDRESS=${HL_ACCOUNT_ADDRESS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - MBIO_SESSION_SECRET=${MBIO_SESSION_SECRET}
      - MBIO_ADMIN_PASSWORD=${MBIO_ADMIN_PASSWORD}
      - MBIO_ADMIN_EMAIL=${MBIO_ADMIN_EMAIL}
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - mbio-network

  redis:
    image: redis:7-alpine
    container_name: mbio-redis
    restart: unless-stopped
    networks:
      - mbio-network

  nginx:
    image: nginx:1.25-alpine
    container_name: mbio-nginx
    ports:
      - "80:80"
    volumes:
      - ./dashboard-v3/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mbio-bot
    restart: unless-stopped
    networks:
      - mbio-network

networks:
  mbio-network:
    driver: bridge
