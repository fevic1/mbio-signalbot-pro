<h1 class="text-2xl font-bold text-white mb-6">Order Desk</h1>
            <div class="tab-bar"><button class="tab-btn active" onclick="showOrderTab('market',this)">Market</button><button class="tab-btn" onclick="showOrderTab('limit',this)">Limit</button><button class="tab-btn" onclick="showOrderTab('stoplimit',this)">Stop-Limit</button><button class="tab-btn" onclick="showOrderTab('trailing',this)">Trailing</button></div>
            <div id="order-market" class="card"><div class="form-grid"><div class="form-group"><label>Asset</label><select id="mkt-asset" class="dynamic-asset-select"></select></div><div class="form-group"><label>Side</label><select id="mkt-side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div><div class="form-group"><label>Size</label><input type="number" id="mkt-size" step="0.0001"></div></div><div class="mt-4"><button class="btn btn-success" onclick="submitMarketOrder()">Execute Market Order</button></div></div>
            <div id="order-limit" class="card" style="display:none;"><div class="form-grid"><div class="form-group"><label>Asset</label><select id="lmt-asset" class="dynamic-asset-select"></select></div><div class="form-group"><label>Side</label><select id="lmt-side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div><div class="form-group"><label>Size</label><input type="number" id="lmt-size" step="0.0001"></div><div class="form-group"><label>Price</label><input type="number" id="lmt-price" step="0.01"></div></div><div class="mt-4"><button class="btn btn-primary" onclick="submitLimitOrder()">Place Limit Order</button></div></div>
            <div id="order-stoplimit" class="card" style="display:none;"><div class="form-grid"><div class="form-group"><label>Asset</label><select id="sl-asset" class="dynamic-asset-select"></select></div><div class="form-group"><label>Side</label><select id="sl-side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div><div class="form-group"><label>Size</label><input type="number" id="sl-size" step="0.0001"></div><div class="form-group"><label>Stop Price</label><input type="number" id="sl-stop" step="0.01"></div><div class="form-group"><label>Limit Price</label><input type="number" id="sl-limit" step="0.01"></div></div><div class="mt-4"><button class="btn btn-primary" onclick="submitStopLimitOrder()">Place Stop-Limit</button></div></div>
            <div id="order-trailing" class="card" style="display:none;"><div class="form-grid"><div class="form-group"><label>Asset</label><select id="ts-asset" class="dynamic-asset-select"></select></div><div class="form-group"><label>Side</label><select id="ts-side"><option value="SELL">SELL</option><option value="BUY">BUY</option></select></div><div class="form-group"><label>Size</label><input type="number" id="ts-size" step="0.0001"></div><div class="form-group"><label>Trail %</label><input type="number" id="ts-trail" step="0.1" value="1.0"></div></div><div class="mt-4"><button class="btn btn-primary" onclick="submitTrailingStop()">Place Trailing Stop</button></div></div>
            <div class="card mt-6"><div class="metric-label mb-3">Position Size Calculator</div><div class="grid grid-cols-1 md:grid-cols-4 gap-4"><div class="form-group"><label>USD Amount</label><input type="number" id="calc-usd" step="1" placeholder="100" oninput="calculatePositionSize()"></div><div class="form-group"><label>Price ($)</label><input type="number" id="calc-price" step="0.01" placeholder="60000" oninput="calculatePositionSize()"></div><div class="form-group"><label>Leverage</label><input type="number" id="calc-leverage" step="1" value="1" min="1" max="50" oninput="calculatePositionSize()"></div><div class="form-group"><label>Result</label><div id="calc-result" class="text-white font-bold pt-2 hidden">-</div></div></div></div>
