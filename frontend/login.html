<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBIO Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-[#151a22] rounded-2xl shadow-2xl p-8 border border-[#262b36]">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-[#5d3ef2] rounded-xl mb-4 shadow-lg">
                <span class="text-3xl font-bold text-white">🤖</span>
            </div>
            <h1 class="text-2xl font-bold text-white">MBIO SignalBot Pro</h1>
            <p class="text-slate-400 mt-2 text-sm">Professional Automated Trading Platform</p>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-slate-400 text-sm mb-2">Email</label>
                <input type="email" id="email" value="fixed@mbio.com" class="w-full bg-[#0b0e11] text-white border border-[#262b36] rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#5d3ef2]" placeholder="Enter email">
            </div>
            <div>
                <label class="block text-slate-400 text-sm mb-2">Password</label>
                <input type="password" id="password" class="w-full bg-[#0b0e11] text-white border border-[#262b36] rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#5d3ef2]" placeholder="Enter password">
            </div>
            <button type="submit" class="w-full bg-[#5d3ef2] hover:bg-[#4b30cf] text-white py-3 rounded-lg font-semibold transition shadow-lg">
                Sign In
            </button>
            <div id="login-error" class="text-red-400 text-sm text-center hidden"></div>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var errorDiv = document.getElementById('login-error');
            errorDiv.classList.add('hidden');
            try {
                var resp = await fetch('/api/dashboard/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                if (resp.ok) {
                    window.location.href = '/dashboard';
                } else {
                    var data = await resp.json().catch(function() { return {}; });
                    errorDiv.textContent = data.detail || 'Login failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error: ' + err.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
